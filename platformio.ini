[platformio]
src_dir = .
default_envs = esp32-s3-n16r8

[env:esp32-s3-n16r8]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; upload_port intentionally omitted — PlatformIO auto-detects the connected
; board's serial port. A hardcoded value here (e.g. "COM5") only works for
; one person's one machine and silently fails for everyone else (wrong/absent
; port on Windows, and always wrong on macOS/Linux, which use
; /dev/cu.usbserial-* or /dev/ttyUSB*/ttyACM* instead of COMx). If autodetect
; ever picks the wrong port on a machine with multiple serial devices
; attached, override it locally in a gitignored platformio.local.ini or via
; `pio run -t upload --upload-port <port>` rather than hardcoding it here.
monitor_filters = esp32_exception_decoder

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    ; Arduino-ESP32's default CORE_DEBUG_LEVEL (None) silently swallows the
    ; esp_littlefs component's own ESP_LOGE() lines (e.g. "Corrupted dir
    ; pair", "mount failed, (-84)", bad magic/block-size mismatches) — the
    ; only thing that reaches Serial without this is LittleFS.begin()'s
    ; plain true/false return, which says WHETHER it failed but never WHY.
    ; Level 1 = Error only, so this doesn't flood the log with unrelated
    ; verbose/debug noise from the rest of the framework.
    -DCORE_DEBUG_LEVEL=1

board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
; esp32-s3-devkitc-1's board JSON (platform-espressif32 does not ship a
; dedicated N16R8 profile) describes the N8 variant: 8MB flash, NO PSRAM.
; board_upload.flash_size above overrides the flash-size half of that
; mismatch; board_build.arduino.memory_type below is the PSRAM half — without
; it, the 8MB Octal PSRAM this board actually has (confirmed by esptool's own
; chip probe: "Embedded PSRAM 8MB (AP_3v3)") is never enabled or usable by
; the firmware, even though -DBOARD_HAS_PSRAM above makes ps_malloc()/
; heap_caps_malloc(..., MALLOC_CAP_SPIRAM) available in code. qio_opi means
; Quad SPI flash + Octal SPI PSRAM, matching this module's actual silicon.
board_build.arduino.memory_type = qio_opi
; Without this, PlatformIO falls back to the esp32-s3-devkitc-1 board's
; default partition table, which is sized for 8MB flash and gives LittleFS
; only ~1.3-1.9MB — nowhere near enough for data/ (~4MB, dominated by the
; Material Symbols icon font). That mismatch is what produces
; "lfs_write error(-28): File system is full" during `buildfs`, even though
; the N16R8 board actually has 16MB. partitions.csv (repo root) gives two
; 3MB OTA app slots plus a 9.87MB spiffs/LittleFS partition — matching the
; "16M Flash (3MB APP/9.9MB FATFS)" scheme documented in the README's
; Arduino IDE board-settings section.
board_build.partitions = partitions.csv

; Pinned to the exact set verified via `platformio pkg list` on 2026-07-17.
; Exact pins (@x.y.z), not caret ranges (@^x.y.z), so a fresh clone always
; resolves to this known-good set instead of whatever the range allows later.
; NOTE: HTTPClient and WiFiClientSecure (used by the Firestore upload cycle
; in src/core/firebase.cpp) ship as part of the espressif32 Arduino core
; itself — no extra lib_deps entry needed for them.
lib_deps =
    bblanchon/ArduinoJson@7.4.3
    adafruit/DHT sensor library@1.4.7
    adafruit/Adafruit NeoPixel@1.15.5
    milesburton/DallasTemperature@3.11.0
    claws/BH1750@1.3.0
    ESP32Async/AsyncTCP@3.4.10
    ESP32Async/ESPAsyncWebServer@3.11.2
