[platformio]
src_dir = .
default_envs = esp32-s3-n16r8

[env:esp32-s3-n16r8]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB

; Pinned to the exact set verified via `platformio pkg list` on 2026-07-17.
; Exact pins (@x.y.z), not caret ranges (@^x.y.z), so a fresh clone always
; resolves to this known-good set instead of whatever the range allows later.
lib_deps =
    bblanchon/ArduinoJson@7.4.3
    adafruit/DHT sensor library@1.4.7
    adafruit/Adafruit NeoPixel@1.15.5
    milesburton/DallasTemperature@3.11.0
    claws/BH1750@1.3.0
    ESP32Async/AsyncTCP@3.4.10
    ESP32Async/ESPAsyncWebServer@3.11.2
